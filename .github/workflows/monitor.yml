name: 네이버 플레이스 리뷰 모니터링

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "0 0 * * *"
    - cron: "10 0 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드 (once / report / weekly)"
        required: false
        default: "once"

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 설치
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: 크롤링 실행
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "report" ]; then
            python main.py report
          else
            python main.py once
          fi
